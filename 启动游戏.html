<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>启动游戏 - 阻止传送</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    .box {
      text-align: center;
      color: #e0e0e0;
    }
    h1 {
      color: #e94560;
      font-size: 28px;
      margin-bottom: 8px;
    }
    .sub {
      color: #53a8b6;
      font-size: 14px;
      margin-bottom: 24px;
    }
    button {
      padding: 14px 40px;
      font-size: 18px;
      font-weight: bold;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #ff6b81; }
    .status {
      margin-top: 16px;
      font-size: 13px;
      color: #aaa;
    }
    .error {
      margin-top: 16px;
      color: #f39c12;
      font-size: 13px;
    }
  </style>
</head>
<body>
<div class="box">
  <h1>🛡️ 阻止传送</h1>
  <p class="sub">Block Transmission — C++ 塔防游戏</p>
  <button onclick="launch()">🚀 启动游戏</button>
  <p class="status" id="status"></p>
  <p class="error" id="error"></p>
</div>
<script>
async function launch() {
  const btn = document.querySelector('button');
  const st = document.getElementById('status');
  const err = document.getElementById('error');
  btn.disabled = true;
  st.textContent = '⏳ 正在连接服务器...';
  err.textContent = '';

  // 尝试连接 dist 服务器 (端口 9002，最新构建)
  // 如果失败则尝试开发服务器 (端口 9001)
  for (const port of [9002, 9001]) {
    try {
      const resp = await fetch(`http://localhost:${port}/index.html`, { method: 'HEAD', mode: 'no-cors' });
      st.textContent = '✅ 连接成功！正在跳转...';
      setTimeout(() => { window.location.href = `http://localhost:${port}/index.html`; }, 300);
      return;
    } catch(e) {}
  }

  // 两个端口都连不上
  st.textContent = '';
  err.innerHTML = `
    ❌ 服务器未启动<br><br>
    请先运行以下命令启动服务器：<br>
    <code style="background:#0d1117;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:8px;">
      cd 项目目录 && npm run build && npx http-server dist -p 9002 -c-1
    </code>
    <br><br>然后刷新本页面重新点击启动。
  `;
  btn.disabled = false;
}
</script>
</body>
</html>
